<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Inventario - Almacén</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .swal2-input-custom {
            display: flex !important;
            flex-direction: column;
            gap: 0.5rem;
            padding: 0.5rem;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased min-h-screen flex flex-col">

    <nav class="bg-slate-900 border-b border-slate-800 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i data-lucide="boxes" class="text-indigo-400"></i> MULTISERVICIOS ALFRE - Sistema de Almacén
            </h1>
            <div class="flex gap-3">
                <button onclick="exportarBackup()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-xl text-sm font-semibold flex items-center gap-2 transition shadow-lg shadow-indigo-600/20 cursor-pointer">
                    <i data-lucide="download" class="w-4 h-4"></i> Exportar Backup (.js)
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl w-full mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-4 gap-6 flex-1">
        
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 shadow-xl flex flex-col items-center">
                <h2 class="text-md font-semibold mb-3 flex items-center gap-2 text-indigo-400 w-full">
                    <i data-lucide="qr-code"></i> Escáner de Productos
                </h2>
                <div class="relative w-full aspect-square bg-slate-950 rounded-xl overflow-hidden border border-slate-800 flex items-center justify-center">
                    <div id="reader" class="w-full h-full object-cover"></div>
                    <div id="placeholder-camara" class="absolute inset-0 flex flex-col items-center justify-center text-center p-4 bg-slate-950 z-10">
                        <i data-lucide="video-off" class="w-8 h-8 text-slate-600 mb-2"></i>
                        <p class="text-xs text-slate-400">Cámara Apagada</p>
                    </div>
                </div>
                <button id="btn-camara" onclick="toggleCamara()" class="mt-4 w-full bg-slate-800 hover:bg-slate-700 text-white py-2.5 px-4 rounded-xl text-sm font-semibold transition flex items-center justify-center gap-2 cursor-pointer border border-slate-700">
                    <i data-lucide="camera" class="w-4 h-4"></i> <span>Activar Lector</span>
                </button>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-xl">
                <h2 class="text-md font-semibold mb-4 flex items-center gap-2 text-emerald-400">
                    <i data-lucide="wallet"></i> Balance Total
                </h2>
                <div class="space-y-4">
                    <div>
                        <p class="text-xs text-slate-400 uppercase tracking-wider">Valor de Inventario</p>
                        <p class="text-3xl font-extrabold text-white mt-1" id="totalInventario">S/. 0.00</p>
                    </div>
                    <div class="pt-3 border-t border-slate-800 flex justify-between text-xs text-slate-400">
                        <span>Items registrados:</span>
                        <span class="font-bold text-slate-200" id="cantidadItems">0</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-3 space-y-6">
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
                    <div>
                        <h2 class="text-lg font-bold text-white">Listado de Artículos</h2>
                        <p class="text-xs text-slate-400">Visualiza, añade y modifica los productos del almacén.</p>
                    </div>
                    <button onclick="crearProductoForm()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2.5 rounded-xl text-sm font-semibold shadow-lg shadow-indigo-600/20 transition flex items-center gap-2 cursor-pointer self-start sm:self-auto">
                        <i data-lucide="plus" class="w-4 h-4"></i> Añadir Producto
                    </button>
                </div>

                <div class="overflow-x-auto rounded-xl border border-slate-800">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-950/60 border-b border-slate-800 text-xs font-semibold uppercase text-slate-400 tracking-wider">
                                <th class="p-3.5">Código / QR</th>
                                <th class="p-3.5">Descripción</th>
                                <th class="p-3.5">U.M.</th>
                                <th class="p-3.5">Caducidad</th>
                                <th class="p-3.5 text-right">Cant.</th>
                                <th class="p-3.5 text-right">Precio</th>
                                <th class="p-3.5 text-right">Total</th>
                                <th class="p-3.5 text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaProductos" class="divide-y divide-slate-800 text-sm text-slate-300">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 1. BASE DE DATOS INICIAL EXTRACTADA DE TU EXCEL
        let inventario = [
            { codigo: "001", unidad: "SACO", descripcion: "ARROZ X 49 KILOS - TONDERITO", caducidad: "2027-12-01", cantidad: 70, precio: 198.00 },
            { codigo: "002", unidad: "SACO", descripcion: "ARROZ TONDERITO X 25 KG", caducidad: "2027-02-18", cantidad: 62, precio: 99.00 },
            { codigo: "003", unidad: "SACO", descripcion: "ARROZ TONDERITO X 10 KG", caducidad: "", cantidad: 19, precio: 42.00 },
            { codigo: "004", unidad: "SACO", descripcion: "ARROZ MAS SABOR X 5 KG", caducidad: "", cantidad: 10, precio: 24.00 },
            { codigo: "005", unidad: "SACO", descripcion: "ARROZ MAS SABOR X 10 KG", caducidad: "2026-10-01", cantidad: 8, precio: 48.00 },
            { codigo: "006", unidad: "SACO", descripcion: "ARROZ MAS SABOR X 50 KG", caducidad: "2026-08-01", cantidad: 21, precio: 215.00 },
            { codigo: "007", unidad: "SACOS", descripcion: "AZUCAR RUBIA ANTIGUO X 50 KG - POMALCA", caducidad: "2027-02-18", cantidad: 16, precio: 125.00 },
            { codigo: "042", unidad: "KILOS", descripcion: "AJI COLORADO", caducidad: "2027-05-01", cantidad: 2, precio: 32.00 },
            { codigo: "043", unidad: "UNIDAD", descripcion: "MILO EN LATA 380 GRAMOS", caducidad: "2027-10-15", cantidad: 5, precio: 22.00 },
            { codigo: "044", unidad: "SACO", descripcion: "HARINA", caducidad: "", cantidad: 2, precio: 118.00 },
            { codigo: "045", unidad: "BOLSA", descripcion: "ARROZ X 1 KG", caducidad: "", cantidad: 20, precio: 5.00 },
            { codigo: "046", unidad: "BOLSA", descripcion: "AZUCAR X 1 KG", caducidad: "2026-05-20", cantidad: 35, precio: 5.00 },
            { codigo: "047", unidad: "CAJA", descripcion: "MANTEQUILLA GLORIA 180G X 24 UNIDADES", caducidad: "2026-05-17", cantidad: 1, precio: 288.00 },
            { codigo: "048", unidad: "CAJA", descripcion: "MANTEQUILLA GLORIA 390G X 24 UNIDADES", caducidad: "", cantidad: 1, precio: 456.00 },
            { codigo: "049", unidad: "SACO", descripcion: "ARROCILLO X 50", caducidad: "", cantidad: 3, precio: 125.00 }
        ];

        let html5QrcodeScanner = null;
        let esEscaneando = false;

        // Inicializador
        document.addEventListener("DOMContentLoaded", () => {
            renderizarInventario();
            lucide.createIcons();
        });

        // 2. RENDERIZADO Y CÁLCULOS
        function renderizarInventario() {
            const tbody = document.getElementById("tablaProductos");
            tbody.innerHTML = "";
            let sumaTotal = 0;

            inventario.forEach(prod => {
                const totalItem = prod.cantidad * prod.precio;
                sumaTotal += totalItem;

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-800/30 transition border-b border-slate-800/50" id="prod-row-${prod.codigo}">
                        <td class="p-3.5 font-mono text-xs font-semibold text-indigo-400">${prod.codigo}</td>
                        <td class="p-3.5 font-medium text-white">${prod.descripcion}</td>
                        <td class="p-3.5 text-xs text-slate-400">${prod.unidad}</td>
                        <td class="p-3.5 text-xs font-mono ${prod.caducidad ? 'text-amber-400' : 'text-slate-600'}">${prod.caducidad || '—'}</td>
                        <td class="p-3.5 text-right font-semibold">${prod.cantidad}</td>
                        <td class="p-3.5 text-right text-slate-400">S/. ${prod.precio.toFixed(2)}</td>
                        <td class="p-3.5 text-right font-bold text-emerald-400">S/. ${totalItem.toFixed(2)}</td>
                        <td class="p-3.5 text-center space-x-1">
                            <button onclick="editarProductoForm('${prod.codigo}')" class="text-indigo-400 hover:bg-indigo-500/10 p-1.5 rounded-lg transition inline-flex items-center cursor-pointer" title="Editar"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                            <button onclick="eliminarProducto('${prod.codigo}')" class="text-rose-400 hover:bg-rose-500/10 p-1.5 rounded-lg transition inline-flex items-center cursor-pointer" title="Eliminar"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </td>
                    </tr>
                `;
            });

            // Actualizar paneles estadísticos
            document.getElementById("totalInventario").innerText = `S/. ${sumaTotal.toLocaleString('es-PE', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            document.getElementById("cantidadItems").innerText = inventario.length;
            lucide.createIcons();
        }

        // 3. FORMULARIOS DE ACCIÓN (CRUD)
        async function crearProductoForm() {
            const { value: formValues } = await Swal.fire({
                title: 'Nuevo Producto',
                background: '#1e293b',
                color: '#f1f5f9',
                html: `
                    <div class="swal2-input-custom text-left">
                        <label class="text-xs font-semibold text-slate-400">Código de Barras / ID</label>
                        <input id="swal-codigo" class="swal2-input m-0 w-full bg-slate-900 border-slate-700 text-white rounded-lg p-2" placeholder="Ej: 050">
                        <label class="text-xs font-semibold text-slate-400 mt-2">Descripción del Producto</label>
                        <input id="swal-descripcion" class="swal2-input m-0 w-full bg-slate-900 border-slate-700 text-white rounded-lg p-2" placeholder="Nombre completo">
                        <label class="text-xs font-semibold text-slate-400 mt-2">Unidad de Medida</label>
                        <input id="swal-unidad" class="swal2-input m-0 w-full bg-slate-900 border-slate-700 text-white rounded-lg p-2" placeholder="SACO, KILOS, UNIDAD...">
                        <label class="text-xs font-semibold text-slate-400 mt-2">Fecha de Caducidad</label>
                        <input id="swal-caducidad" type="date" class="swal2-input m-0 w-full bg-slate-900 border-slate-700 text-white rounded-lg p-2">
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <div>
                                <label class="text-xs font-semibold text-slate-400">Cantidad</label>
                                <input id="swal-cantidad" type="number" class="swal2-input m-0 w-full bg-slate-900 border-slate-700 text-white rounded-lg p-2" value="0">
                            </div>
                            <div>
                                <label class="text-xs font-semibold text-slate-400">Precio Unitario (S/.)</label>
                                <input id="swal-precio" type="number" step="0.01" class="swal2-input m-0 w-full bg-slate-900 border-slate-700 text-white rounded-lg p-2" value="0.00">
                            </div>
                        </div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'Añadir',
                confirmButtonColor: '#4f46e5',
                cancelButtonText: 'Cancelar',
                preConfirm: () => {
                    const codigo = document.getElementById('swal-codigo').value.trim();
                    const descripcion = document.getElementById('swal-descripcion').value.trim();
                    if (!codigo || !descripcion) {
                        Swal.showValidationMessage('Código y Descripción son campos obligatorios');
                        return false;
                    }
                    if (inventario.some(p => p.codigo === codigo)) {
                        Swal.showValidationMessage('El código ingresado ya está asignado a otro ítem');
                        return false;
                    }
                    return {
                        codigo,
                        descripcion,
                        unidad: document.getElementById('swal-unidad').value.trim().toUpperCase() || 'UND',
                        caducidad: document.getElementById('swal-caducidad').value,
                        cantidad: parseInt(document.getElementById('swal-cantidad').value) || 0,
                        precio: parseFloat(document.getElementById('swal-precio').value) || 0.00
                    }
                }
            });

            if (formValues) {
                inventario.push(formValues);
                renderizarInventario();
                Swal.fire('Registrado', 'El producto ha sido ingresado al sistema.', 'success');
            }
        }

        async function editarProductoForm(codigo) {
            const prod = inventario.find(p => p.codigo === codigo);
            if (!prod) return;

            const { value: formValues } = await Swal.fire({
                title: 'Editar Producto',
                background: '#1e293b',
                color: '#f1f5f9',
                html: `
                    <div class="swal2-input-custom text-left">
                        <label class="text-xs font-semibold text-slate-500">Código (Invariable)</label>
                        <input id="swal-codigo" class="swal2-input m-0 w-full bg-slate-950 border-slate-800 text-slate-500 rounded-lg p-2 cursor-not-allowed" value="${prod.codigo}" readonly>
                        <label class="text-xs font-semibold text-slate-400 mt-2">Descripción del Producto</label>
                        <input id="swal-descripcion" class="swal2-input m-0 w-full bg-slate-900 border-slate-700 text-white rounded-lg p-2" value="${prod.descripcion}">
                        <label class="text-xs font-semibold text-slate-400 mt-2">Unidad de Medida</label>
                        <input id="swal-unidad" class="swal2-input m-0 w-full bg-slate-900 border-slate-700 text-white rounded-lg p-2" value="${prod.unidad}">
                        <label class="text-xs font-semibold text-slate-400 mt-2">Fecha de Caducidad</label>
                        <input id="swal-caducidad" type="date" class="swal2-input m-0 w-full bg-slate-900 border-slate-700 text-white rounded-lg p-2" value="${prod.caducidad}">
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <div>
                                <label class="text-xs font-semibold text-slate-400">Cantidad</label>
                                <input id="swal-cantidad" type="number" class="swal2-input m-0 w-full bg-slate-900 border-slate-700 text-white rounded-lg p-2" value="${prod.cantidad}">
                            </div>
                            <div>
                                <label class="text-xs font-semibold text-slate-400">Precio Unitario (S/.)</label>
                                <input id="swal-precio" type="number" step="0.01" class="swal2-input m-0 w-full bg-slate-900 border-slate-700 text-white rounded-lg p-2" value="${prod.precio}">
                            </div>
                        </div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'Actualizar',
                confirmButtonColor: '#4f46e5',
                cancelButtonText: 'Cancelar',
                preConfirm: () => {
                    return {
                        codigo: prod.codigo,
                        descripcion: document.getElementById('swal-descripcion').value.trim(),
                        unidad: document.getElementById('swal-unidad').value.trim().toUpperCase(),
                        caducidad: document.getElementById('swal-caducidad').value,
                        cantidad: parseInt(document.getElementById('swal-cantidad').value) || 0,
                        precio: parseFloat(document.getElementById('swal-precio').value) || 0.00
                    }
                }
            });

            if (formValues) {
                const index = inventario.findIndex(p => p.codigo === codigo);
                inventario[index] = formValues;
                renderizarInventario();
                Swal.fire('Modificado', 'Los datos del artículo fueron actualizados.', 'success');
            }
        }

        function eliminarProducto(codigo) {
            Swal.fire({
                title: '¿Retirar del inventario?',
                text: "Esta acción no se puede deshacer.",
                icon: 'warning',
                background: '#1e293b',
                color: '#f1f5f9',
                showCancelButton: true,
                confirmButtonColor: '#f43f5e',
                cancelButtonColor: '#475569',
                confirmButtonText: 'Sí, borrar',
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    inventario = inventario.filter(p => p.codigo !== codigo);
                    renderizarInventario();
                    Swal.fire('Eliminado', 'Producto removido.', 'success');
                }
            });
        }

        // 4. LECTOR DE CÓDIGOS QR
        function toggleCamara() {
            const placeholder = document.getElementById('placeholder-camara');
            const btn = document.getElementById('btn-camara');

            if (!esEscaneando) {
                html5QrcodeScanner = new Html5Qrcode("reader");
                const config = { fps: 10, qrbox: { width: 220, height: 220 } };

                html5QrcodeScanner.start(
                    { facingMode: "environment" }, 
                    config,
                    (decodedText) => {
                        procesarEscaneoQR(decodedText);
                    },
                    (error) => { /* Escaneo pasivo fallido */ }
                ).then(() => {
                    esEscaneando = true;
                    placeholder.classList.add('hidden');
                    btn.className = "mt-4 w-full bg-rose-600 hover:bg-rose-500 text-white py-2.5 px-4 rounded-xl text-sm font-semibold transition flex items-center justify-center gap-2 cursor-pointer border border-rose-500";
                    btn.innerHTML = `<i data-lucide="square" class="w-4 h-4"></i><span>Apagar Lector</span>`;
                    lucide.createIcons();
                }).catch(err => {
                    Swal.fire('Cámara', 'Asegúrate de conceder permisos y navegar desde un sitio seguro (HTTPS).', 'error');
                });
            } else {
                html5QrcodeScanner.stop().then(() => {
                    esEscaneando = false;
                    placeholder.classList.remove('hidden');
                    btn.className = "mt-4 w-full bg-slate-800 hover:bg-slate-700 text-white py-2.5 px-4 rounded-xl text-sm font-semibold transition flex items-center justify-center gap-2 cursor-pointer border border-slate-700";
                    btn.innerHTML = `<i data-lucide="camera" class="w-4 h-4"></i><span>Activar Lector</span>`;
                    lucide.createIcons();
                });
            }
        }

        function procesarEscaneoQR(codigoLeido) {
            const cleanCode = codigoLeido.trim();
            const prod = inventario.find(p => p.codigo === cleanCode);

            if (prod) {
                if (navigator.vibrate) navigator.vibrate(100);
                
                // Resaltar fila temporalmente en la tabla
                const fila = document.getElementById(`prod-row-${cleanCode}`);
                if (fila) {
                    fila.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    fila.classList.add('bg-indigo-600/30');
                    setTimeout(() => fila.classList.remove('bg-indigo-600/30'), 3000);
                }

                // Abrir edición del producto automáticamente
                editarProductoForm(cleanCode);
            } else {
                Swal.fire({
                    title: 'Código desconocido',
                    text: `El código "${cleanCode}" no está en el inventario. ¿Deseas crearlo ahora?`,
                    icon: 'question',
                    background: '#1e293b',
                    color: '#f1f5f9',
                    showCancelButton: true,
                    confirmButtonText: 'Crear',
                    cancelButtonText: 'Omitir'
                }).then((r) => {
                    if (r.isConfirmed) {
                        crearProductoForm();
                        // Pre-rellenar el código en el input si se abre de inmediato
                        setTimeout(() => {
                            const inputCod = document.getElementById('swal-codigo');
                            if(inputCod) inputCod.value = cleanCode;
                        }, 400);
                    }
                });
            }
        }

        // 5. EXPORTAR COPIA DE SEGURIDAD (.JS)
        function exportarBackup() {
            const dataBackup = {
                almacen: "MULTISERVICIOS ALFRE",
                fechaExportacion: new Date().toISOString(),
                inventario: inventario
            };

            const contenidoArchivo = `// Backup de Sistema de Almacén\nconst backupInventario = ${JSON.stringify(dataBackup, null, 4)};\nconsole.log("Copia de inventario cargada.");`;
            
            const blob = new Blob([contenidoArchivo], { type: "application/javascript;charset=utf-8;" });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            
            link.setAttribute("href", url);
            link.setAttribute("download", `backup_inventario_${new Date().toISOString().split('T')[0]}.js`);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            Swal.fire('Backup generado', 'El archivo JS se descargó correctamente.', 'success');
        }
    </script>
</body>
</html>
