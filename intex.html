<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <nav class="bg-blue-600 text-white shadow-md sticky top-0 z-50">

    <main class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-3 gap-6">

                    <i data-lucide="qr-code"></i> Escáner de Asistencia QR

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">

                    <i data-lucide="calendar-check"></i> Control de Asistencia
                </h2>

                </div>

                <div class="mt-4 pt-4 border-t border-slate-100">
                    <h3 class="text-sm font-semibold text-slate-700 mb-2">Asistencias de la Fecha</h3>
                    <div class="overflow-y-auto max-h-60 space-y-2" id="listaAsistenciasFecha">
                        </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-4">

                <div class="overflow-x-auto rounded-lg border border-slate-100">

                                <th class="p-3">Estudiante</th>
                                <th class="p-3">Género</th>
                                <th class="p-3">Edad</th>
                                <th class="p-3">Teléfono</th>
                                <th class="p-3 text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaEstudiantes" class="divide-y divide-slate-100 text-sm text-slate-700">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

        // Objeto contenedor de asistencias estructurado por fechas

        // Inicialización de la Aplicación
        document.addEventListener("DOMContentLoaded", () => {

        // 2. RENDERIZADO DINÁMICO DE ELEMENTOS
        function renderizarEstudiantes() {
            const tbody = document.getElementById("tablaEstudiantes");
            tbody.innerHTML = "";
            
            estudiantes.forEach(est => {
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-3 font-mono text-xs font-semibold text-slate-600">${est.dni}</td>

                        <td class="p-3 text-slate-500">${est.telefono}</td>
                        <td class="p-3 text-right space-x-1">

                            <button onclick="eliminarEstudiante('${est.dni}')" class="text-red-600 hover:bg-red-50 p-1.5 rounded transition inline-flex items-center" title="Eliminar"><i data-lucide="trash-2" class="w-4 h-4"></i></button>

        function renderizarAsistencias() {
            const fecha = document.getElementById('fechaAsistencia').value;
            const contenedor = document.getElementById('listaAsistenciasFecha');
            contenedor.innerHTML = "";

            if (!fecha) return;

            const registrosHoy = asistencias[fecha] || [];

            if (registrosHoy.length === 0) {
                contenedor.innerHTML = `<p class="text-xs text-slate-400 text-center py-4">No hay asistencias registradas para esta fecha.</p>`;
                return;
            }

            registrosHoy.forEach((reg, index) => {
                const est = estudiantes.find(e => e.dni === reg.dni);
                const nombreCompleto = est ? `${est.apellidos}, ${est.nombres}` : `DNI Desconocido (${reg.dni})`;
                const colorEstado = reg.estado === 'Asistió' ? 'bg-emerald-100 text-emerald-800' : reg.estado === 'Tardanza' ? 'bg-amber-100 text-amber-800' : 'bg-red-100 text-red-800';
                
                contenedor.innerHTML += `
                    <div class="flex items-center justify-between p-2 rounded-lg bg-slate-50 border border-slate-100 text-xs">
                        <div>
                            <p class="font-medium text-slate-800">${nombreCompleto}</p>
                            <p class="text-[10px] text-slate-400">Hora: ${reg.hora}</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="px-2 py-0.5 rounded-full font-semibold ${colorEstado}">${reg.estado}</span>
                            <button onclick="cambiarEstadoAsistencia('${fecha}', ${index})" class="text-slate-500 hover:text-blue-600 transition" title="Cambiar Estado"><i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i></button>

                        </div>

                `;
            });
            lucide.createIcons();
        }

        // 3. OPERACIONES CRUD PARA ALUMNOS (SWEETALERT2)
        async function crearEstudianteForm() {
            const { value: formValues } = await Swal.fire({

                html: `
                    <div class="swal2-input-custom text-left">
                        <label class="text-xs font-semibold text-gray-600">DNI</label>
                        <input id="swal-dni" class="swal2-input m-0 w-full" placeholder="DNI">
                        <label class="text-xs font-semibold text-gray-600 mt-2">Nombres</label>
                        <input id="swal-nombres" class="swal2-input m-0 w-full" placeholder="Nombres">
                        <label class="text-xs font-semibold text-gray-600 mt-2">Apellidos</label>
                        <input id="swal-apellidos" class="swal2-input m-0 w-full" placeholder="Apellidos">
                        <label class="text-xs font-semibold text-gray-600 mt-2">Género</label>
                        <select id="swal-genero" class="swal2-input m-0 w-full">

                            <option value="Femenino">Femenino</option>
                        </select>

                        <input id="swal-edad" type="number" class="swal2-input m-0 w-full" placeholder="Edad">
                        <label class="text-xs font-semibold text-gray-600 mt-2">Teléfono</label>

                cancelButtonText: 'Cancelar',

                    const dni = document.getElementById('swal-dni').value.trim();

            if (formValues) {
                estudiantes.push(formValues);
                renderizarEstudiantes();
                Swal.fire('¡Éxito!', 'Estudiante registrado correctamente.', 'success');

        async function editarEstudianteForm(dni) {
            const est = estudiantes.find(e => e.dni === dni);
            if (!est) return;

            const { value: formValues } = await Swal.fire({
                title: 'Editar Estudiante',

                    <div class="swal2-input-custom text-left">

                        <input id="swal-edad" type="number" class="swal2-input m-0 w-full" value="${est.edad}">

                `,

                confirmButtonText: 'Actualizar',

                preConfirm: () => {

                renderizarEstudiantes();
                renderizarAsistencias();
                Swal.fire('¡Actualizado!', 'Datos del estudiante modificados.', 'success');
            }
        }

        function eliminarEstudiante(dni) {
            Swal.fire({
                title: '¿Eliminar estudiante?',
                text: "Esta acción removerá al alumno permanentemente.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Sí, eliminar',
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    estudiantes = estudiantes.filter(e => e.dni !== dni);
                    renderizarEstudiantes();
                    Swal.fire('Eliminado', 'El estudiante ha sido removido.', 'success');
                }
            });
        }

        // 4. PROCESO Y LOGÍSTICA DE ASISTENCIA
        function registrarAsistenciaProceso(dni, estadoInput = null) {
            const fecha = document.getElementById('fechaAsistencia').value;
            if (!fecha) {
                Swal.fire('Aviso', 'Seleccione una fecha de control primero.', 'info');
                return;
            }

            const est = estudiantes.find(e => e.dni === dni);
            if (!est) {
                Swal.fire('No encontrado', `El DNI escaneado (${dni}) no figura en la lista de estudiantes.`, 'error');
                return;
            }

            if (!asistencias[fecha]) {
                asistencias[fecha] = [];
            }

            if (asistencias[fecha].some(r => r.dni === dni)) {
                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: 'warning',
                    title: `Ya se registró asistencia hoy para ${est.nombres}`,
                    showConfirmButton: false,
                    timer: 3000
                });
                return;
            }

            const ahora = new Date();
            const horaActual = `${String(ahora.getHours()).padStart(2, '0')}:${String(ahora.getMinutes()).padStart(2, '0')}`;
            const estadoFinal = estadoInput || 'Asistió';

            asistencias[fecha].push({
                dni: dni,
                estado: estadoFinal,
                hora: horaActual
            });

            renderizarAsistencias();
            
            Swal.fire({
                toast: true,
                position: 'top-end',
                icon: 'success',
                title: `Ingreso: ${est.nombres} [${estadoFinal}]`,
                showConfirmButton: false,
                timer: 2500
            });
        }

        async function registrarAsistenciaManualForm() {
            if(estudiantes.length === 0){
                Swal.fire('Error', 'No hay estudiantes en el sistema.', 'error');
                return;
            }
            
            let opcionesHTML = estudiantes.map(e => `<option value="${e.dni}">${e.apellidos}, ${e.nombres} (${e.dni})</option>`).join('');

            const { value: formValues } = await Swal.fire({
                title: 'Asistencia Manual',
                html: `
                    <div class="swal2-input-custom text-left">
                        <label class="text-xs font-semibold text-gray-600">Estudiante</label>
                        <select id="asist-dni" class="swal2-input m-0 w-full text-sm">
                            ${opcionesHTML}
                        </select>
                        <label class="text-xs font-semibold text-gray-600 mt-2">Estado</label>
                        <select id="asist-estado" class="swal2-input m-0 w-full">
                            <option value="Asistió">Asistió</option>
                            <option value="Tardanza">Tardanza</option>
                            <option value="Falta">Falta</option>
                        </select>
                    </div>
                `,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'Registrar',
                cancelButtonText: 'Cancelar',
                preConfirm: () => {
                    return {
                        dni: document.getElementById('asist-dni').value,
                        estado: document.getElementById('asist-estado').value
                    }
                }
            });

            if (formValues) {
                registrarAsistenciaProceso(formValues.dni, formValues.estado);
            }
        }

        function cambiarEstadoAsistencia(fecha, index) {
            const estados = ['Asistió', 'Tardanza', 'Falta'];
            let actual = asistencias[fecha][index].estado;
            let nuevoIndex = (estados.indexOf(actual) + 1) % estados.length;
            
            asistencias[fecha][index].estado = estados[nuevoIndex];
            renderizarAsistencias();
        }

        function eliminarAsistencia(fecha, index) {
            asistencias[fecha].splice(index, 1);
            renderizarAsistencias();
        }

        // 5. CÁMARA Y ESCÁNER QR (INSTASCAN)
        let scanner = null;
        function encenderCamara() {
            if (scanner === null) {
                scanner = new Instascan.Scanner({ video: document.getElementById('preview'), mirror: false });
                
                scanner.addListener('scan', function (content) {
                    if (content) {
                        // Limpia espacios e intenta procesar el DNI leído
                        registrarAsistenciaProceso(content.trim());
                    }
                });
            }

            Instascan.Camera.getCameras().then(function (cameras) {
                if (cameras.length > 0) {
                    // Intenta forzar la cámara trasera de dispositivos móviles
                    let camaraSeleccionada = cameras[0];
                    for (let i = 0; i < cameras.length; i++) {
                        if (cameras[i].name.toLowerCase().includes('back') || cameras[i].name.toLowerCase().includes('trasera')) {
                            camaraSeleccionada = cameras[i];
                            break;
                        }
                    }
                    scanner.start(camaraSeleccionada);
                } else {
                    Swal.fire('Dispositivo', 'No se detectaron cámaras en este dispositivo.', 'error');
                }
            }).catch(function (e) {
                console.error(e);
                Swal.fire('Permisos', 'Error de acceso a cámara. Asegúrate de otorgar permisos o navegar bajo un entorno seguro (HTTPS o localhost).', 'error');
            });
        }

        // 6. EXPORTAR ARCHIVO JS COMO BACKUP
        function exportarBackup() {
            const dataBackup = {
                fechaExportacion: new Date().toISOString(),
                estudiantes: estudiantes,
                asistencias: asistencias
